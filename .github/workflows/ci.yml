name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & type checks ─────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & type checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/vitest-mobile
      - run: npm run lint
      - run: npm run check-types
      - run: npm run format:check

  # ── Unit + integration tests ───────────────────────────────────────────────
  unit-tests:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
        working-directory: packages/vitest-mobile

  # ── E2E: Android ───────────────────────────────────────────────────────────
  e2e-android:
    name: E2E (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace=packages/vitest-mobile

      - name: Build test harness app
        run: npx vitest-mobile build android

      - name: Run E2E tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            npx vitest-mobile install android
            npx vitest run --project android

  # ── E2E: iOS ───────────────────────────────────────────────────────────────
  e2e-ios:
    name: E2E (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace=packages/vitest-mobile

      - name: Build test harness app
        run: npx vitest-mobile build ios

      - name: Boot simulator
        run: npx vitest-mobile boot-device ios

      - name: Install app on simulator
        run: npx vitest-mobile install ios

      - name: Run E2E tests
        run: npx vitest run --project ios
