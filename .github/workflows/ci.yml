name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & type checks ─────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & type checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/vitest-react-native-runtime
      - run: npm run lint
      - run: npm run check-types
      - run: npm run format:check

  # ── Unit + integration tests ───────────────────────────────────────────────
  unit-tests:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
        working-directory: packages/vitest-react-native-runtime

  # ── E2E: Android ───────────────────────────────────────────────────────────
  e2e-android:
    name: E2E (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace=packages/vitest-react-native-runtime

      - name: Build test harness app
        run: npm run app:build:android

      - name: Run E2E tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            npm run app:install:android
            npm run test:e2e:android

  # ── E2E: iOS ───────────────────────────────────────────────────────────────
  e2e-ios:
    name: E2E (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace=packages/vitest-react-native-runtime

      - name: Build test harness app
        run: npm run app:build:ios

      - name: Boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for runtime, devs in d['devices'].items():
            for dev in devs:
              if dev.get('isAvailable') and dev.get('udid'):
                print(dev['udid'])
                exit()
          ")
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIM_ID"
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Install app on simulator
        run: npm run app:install:ios

      - name: Run E2E tests
        run: npm run test:e2e:ios
